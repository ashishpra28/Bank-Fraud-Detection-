services:
  api:
    image: ashish7733/fraudshield-api:latest
    container_name: fraud_api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

    restart: always

  streamlit:
    image: ashish7733/fraudshield-ui:latest 
    container_name: fraud_app 
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: always